# Golden dataset for the code review agent (Week-4 eval).
#
# Recall    = of the known issues below, how many did the agent catch?
# Precision = of the findings the agent produced, how many are valid (judged by
#             an INDEPENDENT model — see evals/judge.py)?
#
# Ground truth for the seeded PRs lives in eval-target-repo/SEEDED_BUGS.md.
# A PR with `expected: []` has NO recall ground truth — it contributes only to
# precision/noise (the judge labels every finding).
#
# Each case is tagged with:
#   scenario_type: happy | edge | known_failure | adversarial
#   difficulty:    easy | medium | hard
#
# Scenario mix (30 cases): happy ~47% (14) · edge ~37% (11) ·
#                          known_failure 10% (3) · adversarial 7% (2).

thresholds:
  recall_overall: 0.80        # catch >= 80% of known issues
  precision_overall: 0.70     # >= 70% of produced findings are valid
  max_fp_per_pr: 3.0          # average false positives per PR

prs:
  # ──────────────────────────────────────────────────────────────────────
  # HAPPY PATH — well-formed PRs with clear, catchable issues (~50%)
  # ──────────────────────────────────────────────────────────────────────
  - name: security-sql-injection
    url: https://github.com/atlas1408-code/eval-target-repo/pull/1
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: S1-sql-injection
        category: security
        severity: critical
        path: app/search.py
        lines: [11, 22]
        description: "User-supplied `owner`/`term` are interpolated into the SQL query via an f-string (SQL injection)."
        keywords: ["sql injection", "parameteri", "interpolat", "f-string", "injection"]
      - id: S2-hardcoded-secret
        category: security
        severity: high
        path: app/search.py
        lines: [8, 8]
        description: "A live-looking API token (EXPORT_API_TOKEN) is hardcoded in source."
        keywords: ["hardcoded", "secret", "credential", "api token", "api key", "token"]

  - name: quality-refactor
    url: https://github.com/atlas1408-code/eval-target-repo/pull/2
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: Q1-mutable-default
        category: quality
        severity: medium
        path: app/digest.py
        lines: [6, 6]
        description: "build_digest uses a mutable default argument `tags=[]` shared across calls."
        keywords: ["mutable default", "default argument", "tags=[]", "shared", "mutable"]
      - id: Q2-duplicated-logic
        category: quality
        severity: low
        path: app/digest.py
        lines: [33, 42]
        description: "Title and body formatting blocks are near-identical, duplicated logic."
        keywords: ["duplicat", "repeated", "copy-paste", "extract a helper", "redundan"]
      - id: Q3-dead-code
        category: quality
        severity: low
        path: app/digest.py
        lines: [27, 30]
        description: "Code after an early `return` in build_digest is unreachable."
        keywords: ["dead code", "unreachable", "after return", "never executed"]
      - id: Q4-bare-except
        category: quality
        severity: medium
        path: app/digest.py
        lines: [22, 25]
        description: "A bare `except:` swallows all errors around the count step."
        keywords: ["bare except", "except:", "broad except", "catch-all", "swallow"]

  - name: test-gap
    url: https://github.com/atlas1408-code/eval-target-repo/pull/3
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: T1-missing-test
        category: test_gap
        severity: medium
        path: app/stats.py
        lines: [13, 33]
        description: "New public functions (reading_time_minutes/note_stats) ship with no matching test file."
        keywords: ["test", "coverage", "untested", "no test"]

  - name: security-path-traversal
    url: https://github.com/atlas1408-code/eval-target-repo/pull/6
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: P1-path-traversal
        category: security
        severity: high
        path: app/files.py
        lines: [9, 11]
        description: "read_export joins a user-supplied `filename` onto EXPORT_DIR with no sanitization, allowing `../` path traversal outside the export directory."
        keywords: ["path traversal", "directory traversal", "../", "sanitize", "os.path.join", "user-supplied path"]

  - name: security-weak-hash
    url: https://github.com/atlas1408-code/eval-target-repo/pull/7
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: H1-weak-hash
        category: security
        severity: medium
        path: app/hashing.py
        lines: [7, 7]
        description: "Owner API tokens are hashed with MD5 (a broken, fast, unsalted hash) — unsuitable for secrets."
        keywords: ["md5", "weak hash", "insecure hash", "salt", "sha-256", "broken hash"]

  - name: security-command-injection
    url: https://github.com/atlas1408-code/eval-target-repo/pull/8
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: C1-command-injection
        category: security
        severity: critical
        path: app/backup.py
        lines: [7, 7]
        description: "backup_db interpolates `dest_path` into an os.system shell command (command injection)."
        keywords: ["command injection", "os.system", "shell", "subprocess", "shell=true", "untrusted input"]

  - name: security-insecure-pickle
    url: https://github.com/atlas1408-code/eval-target-repo/pull/9
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: D1-insecure-deserialization
        category: security
        severity: high
        path: app/cache.py
        lines: [7, 7]
        description: "load_cache calls pickle.loads on stored bytes — deserializing untrusted data enables arbitrary code execution."
        keywords: ["pickle", "deserializ", "insecure deserialization", "arbitrary code", "untrusted", "rce"]

  - name: quality-nested-complexity
    url: https://github.com/atlas1408-code/eval-target-repo/pull/10
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: N1-nested-complexity
        category: quality
        severity: low
        path: app/classify.py
        lines: [8, 30]
        description: "classify_note is a deeply nested if/elif tree with hard-coded magic numbers (50/500/5000); high cyclomatic complexity, should be flattened / table-driven."
        keywords: ["nested", "complexity", "cyclomatic", "magic number", "deeply nested", "flatten", "guard clause"]

  - name: quality-nplus1
    url: https://github.com/atlas1408-code/eval-target-repo/pull/11
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: NP1-n-plus-one
        category: quality
        severity: medium
        path: app/enrich.py
        lines: [8, 14]
        description: "enrich_ids opens a new DB connection and runs one query per id in a loop (N+1); should batch with a single `WHERE id IN (...)` query."
        keywords: ["n+1", "n plus one", "per iteration", "batch", "loop query", "single query", "connection per"]

  - name: quality-global-state
    url: https://github.com/atlas1408-code/eval-target-repo/pull/12
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: G1-global-mutable-state
        category: quality
        severity: medium
        path: app/metrics.py
        lines: [3, 15]
        description: "Module-level mutable `_CALL_COUNTS` dict is mutated by record() (shared global state, not thread-safe) and snapshot() returns the live internal dict by reference."
        keywords: ["global", "module-level", "mutable state", "thread-safe", "shared state", "returns reference", "global variable"]

  - name: quality-shadow-builtin
    url: https://github.com/atlas1408-code/eval-target-repo/pull/13
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: SB1-shadow-builtin
        category: quality
        severity: low
        path: app/format_list.py
        lines: [4, 8]
        description: "render() shadows the builtins `list` (param) and `id` (loop var), iterates by index, and builds the string with `+=` in a loop instead of str.join."
        keywords: ["shadow", "builtin", "redefine builtin", "list", "id", "join", "string concatenation", "enumerate"]

  - name: bug-off-by-one
    url: https://github.com/atlas1408-code/eval-target-repo/pull/14
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: O1-off-by-one
        category: quality
        severity: medium
        path: app/paginate.py
        lines: [8, 8]
        description: "paginate slices `items[start:end + 1]`, returning one extra item per page and overlapping page boundaries (off-by-one)."
        keywords: ["off-by-one", "off by one", "end + 1", "extra item", "overlap", "slice", "boundary"]

  - name: bug-resource-leak
    url: https://github.com/atlas1408-code/eval-target-repo/pull/15
    language: python
    scenario_type: happy
    difficulty: medium
    expected:
      - id: R1-resource-leak
        category: quality
        severity: medium
        path: app/reader.py
        lines: [6, 7]
        description: "read_lines opens a file without a context manager or close(); the file handle leaks."
        keywords: ["resource leak", "file handle", "not closed", "context manager", "with open", "leak", "close"]

  - name: test-gap-wordstats
    url: https://github.com/atlas1408-code/eval-target-repo/pull/16
    language: python
    scenario_type: happy
    difficulty: easy
    expected:
      - id: T2-missing-test
        category: test_gap
        severity: medium
        path: app/wordstats.py
        lines: [1, 14]
        description: "New public functions (average_word_length/longest_word) ship with no matching test file; longest_word has an empty-input branch that is untested."
        keywords: ["test", "coverage", "untested", "no test", "edge case"]

  # ──────────────────────────────────────────────────────────────────────
  # EDGE — clean control + real merged OSS PRs (precision / noise probes, ~30%)
