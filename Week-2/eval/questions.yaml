# Eval question set for the 4-lecture corpus (PLAN.md §6).
#
# ground_truth: "lecture_id HH:MM:SS" entries. A retrieval "hit" = a returned
# chunk from that lecture whose [timestamp_start, timestamp_end] window contains
# the timestamp. Lecture-qualified so a bare timestamp can't match the wrong
# file. Unanswerable questions have answerable:false (success = a refusal).
#
# Categories:
#   single_chunk  — obvious, factual, clearly in the corpus
#   multi_topic   — spans / appears across multiple lectures
#   ambiguous     — underspecified; a reasonable answer is expected
#   borderline    — only lightly touched ("maybe"); tests thin-coverage robustness
#   unanswerable  — not in the corpus; must refuse

